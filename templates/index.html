<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AuraVision - Real-time speech-to-text for the deaf and hard-of-hearing community">
    <title>AuraVision</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow" aria-hidden="true"></div>

    <div class="app">
        <header role="banner">
            <div class="logo">
                <div class="logo-icon" aria-hidden="true">&#x1F441;&#xFE0F;&#x200D;&#x1F5E8;&#xFE0F;</div>
                <span class="logo-text">AuraVision</span>
            </div>
            <p class="subtitle">Real-Time Speech-to-Text</p>
            <div class="lang-badge" role="status" aria-live="polite">
                <span class="dot" aria-hidden="true"></span>
                <span id="lang-label">Waiting for input...</span>
            </div>
        </header>

        <main role="main">
            <div class="main-card" id="main-card">
                <div class="text-area ltr" id="text-display" role="log" aria-live="polite" aria-label="Transcribed speech">
                    <div class="placeholder">
                        <div class="placeholder-icon" aria-hidden="true">&#x1F399;&#xFE0F;</div>
                        <span>Waiting for speech input...</span>
                    </div>
                </div>
                <div class="visualizer" id="visualizer" aria-hidden="true"></div>
            </div>

            <div id="mic-section" class="mic-section" role="region" aria-label="Microphone settings">
                <label for="mic-select">Microphone:</label>
                <select id="mic-select" aria-label="Select microphone"></select>
                <div class="audio-level" id="audio-level" aria-label="Audio input level"></div>
            </div>

            <div class="bottom-bar">
                <div class="status" role="status" aria-live="polite">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="status-text">Connecting...</span>
                </div>
                <div class="mic-info">
                    <span aria-hidden="true">&#x1F3A4;</span>
                    <span id="mic-text">Microphone active</span>
                </div>
            </div>

            <section class="history-section" role="region" aria-label="Transcript history">
                <div class="history-header">
                    <span class="history-title">Transcript</span>
                    <div class="history-actions">
                        <button class="history-btn" onclick="AuraVision.exportHistory()" aria-label="Export transcript">Export</button>
                        <button class="history-btn" onclick="AuraVision.clearHistory()" aria-label="Clear transcript">Clear</button>
                    </div>
                </div>
                <div class="history-list" id="history-list" role="list" aria-label="Transcript entries">
                    <div class="empty-history" id="empty-history">No transcripts yet</div>
                </div>
            </section>
        </main>

        <footer role="contentinfo">
            AuraVision &mdash; Helping the deaf and hard-of-hearing community
            &middot; <a href="https://github.com/Rfannn/AuraVision" target="_blank" rel="noopener">GitHub</a>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
